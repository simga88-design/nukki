<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초간단 누끼 따기 </title>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.2.0/dist/browser/imglyRemoveBackground.umd.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px; background-color: #e9ecef; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input[type="file"] { margin: 20px 0; }
        img { max-width: 100%; margin-top: 20px; border-radius: 8px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgNwEg1gBhEwkA/gNnEQIjQxAAiNTEC4Q2jBhwagwHwGI2mEXAMBwA/1DAhn2w/eAAAAABJRU5ErkJggg=='); /* 투명 배경 체크무늬 */ }
        #loading { display: none; color: #007BFF; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>자동 누끼 따기</h2>
        <p>사진을 올리면 AI가 사람이나 사물을 인식해 배경을 지워줍니다.</p>
        
        <input type="file" id="upload-img" accept="image/png, image/jpeg" />
        <p id="loading">⏳ 배경을 지우고 있습니다...<br><span style="font-size: 12px; color: gray;">(최초 1회 실행 시 AI 모델을 다운로드하느라 시간이 조금 걸립니다!)</span></p>
        
        <img id="result-img" src="" style="display: none;" alt="결과 이미지">
    </div>

    <script>
        const uploadInput = document.getElementById('upload-img');
        const resultImg = document.getElementById('result-img');
        const loading = document.getElementById('loading');

        uploadInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 로딩 메시지 보여주기
            loading.style.display = 'block';
            resultImg.style.display = 'none';

            try {
                // imgly 라이브러리로 배경 제거 실행 (여기서 마법이 일어납니다!)
                const imageBlob = await imglyRemoveBackground(file);
                
                // 결과물(Blob)을 화면에 띄울 수 있는 이미지 URL로 변환
                const url = URL.createObjectURL(imageBlob);
                resultImg.src = url;
                resultImg.style.display = 'block';
            } catch (error) {
                alert('배경을 지우는 중 문제가 발생했습니다.');
                console.error(error);
            } finally {
                // 로딩 메시지 숨기기
                loading.style.display = 'none';
            }
        });
    </script>

</body>
</html>
