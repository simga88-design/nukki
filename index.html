<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초간단 누끼 따기</title>
    <script src="https://unpkg.com/@imgly/background-removal@1.2.0/dist/browser/imglyRemoveBackground.umd.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px; background-color: #e9ecef; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #drop-zone {
            border: 2px dashed #007BFF;
            border-radius: 8px;
            padding: 40px 20px;
            background-color: #f8f9fa;
            color: #333;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
            margin: 20px 0;
        }
        #drop-zone.dragover { background-color: #e2e6ea; border-color: #0056b3; }
        #upload-img { display: none; }

        img { max-width: 100%; margin-top: 20px; border-radius: 8px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgNwEg1gBhEwkA/gNnEQIjQxAAiNTEC4Q2jBhwagwHwGI2mEXAMBwA/1DAhn2w/eAAAAABJRU5ErkJggg=='); }
        #loading { display: none; color: #007BFF; font-weight: bold; margin-top: 15px; }
        
        .btn { padding: 10px 20px; margin-top: 20px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; display: none; }
        .btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="container">
        <h2>✂️ 자동 누끼 따기</h2>
        <p>사진을 올리면 AI가 사람이나 사물을 인식해 배경을 지워줍니다.</p>
        
        <div id="drop-zone">
            📂 이곳으로 이미지 파일을 끌어오거나 클릭하세요.
            <input type="file" id="upload-img" accept="image/png, image/jpeg" />
        </div>

        <p id="loading">⏳ 배경을 지우고 있습니다...<br><span style="font-size: 12px; color: gray;">(최초 1회 실행 시 AI 모델을 다운로드하느라 시간이 조금 걸립니다!)</span></p>
        
        <img id="result-img" src="" style="display: none;" alt="결과 이미지">
        
        <button id="download-btn" class="btn">결과물 다운로드</button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const uploadInput = document.getElementById('upload-img');
        const resultImg = document.getElementById('result-img');
        const loading = document.getElementById('loading');
        const downloadBtn = document.getElementById('download-btn');
        let currentBlobUrl = null;

        // 클릭 시 파일 창 열기 (정상 작동)
        dropZone.addEventListener('click', () => uploadInput.click());

        async function processImage(file) {
            if (!file || !(file.type === 'image/png' || file.type === 'image/jpeg')) {
                alert('PNG 또는 JPG 이미지 파일만 업로드해 주세요!');
                return;
            }

            loading.style.display = 'block';
            resultImg.style.display = 'none';
            downloadBtn.style.display = 'none';

            try {
                // 🚀 AI 모델(WASM 등)을 다운로드하는 경로도 unpkg로 맞춰줍니다.
                const config = {
                    publicPath: 'https://unpkg.com/@imgly/background-removal@1.2.0/dist/'
                };

                const imageBlob = await imglyRemoveBackground(file, config);
                
                if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                
                currentBlobUrl = URL.createObjectURL(imageBlob);
                resultImg.src = currentBlobUrl;
                
                resultImg.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            } catch (error) {
                alert('배경을 지우는 중 문제가 발생했습니다.');
                console.error('에러 상세 내용:', error);
            } finally {
                loading.style.display = 'none';
            }
        }

        // --- 이벤트 리스너 ---
        uploadInput.addEventListener('change', function(e) {
            processImage(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            processImage(file);
        });

        downloadBtn.addEventListener('click', () => {
            if (!currentBlobUrl) return;
            const link = document.createElement('a');
            link.download = 'removed_background.png';
            link.href = currentBlobUrl;
            link.click();
        });
    </script>

</body>
</html>
